<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyber Gradient: Cyan to Lavender to Magenta -->
    <linearGradient id="cyber-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33c2cc" />
      <stop offset="50%" stop-color="#7a57db" />
      <stop offset="100%" stop-color="#ea4884" />
    </linearGradient>
    
    <!-- Orbit Gradient: Royal to transparent-like blue -->
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c33cc" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#33c2cc" stop-opacity="0.2" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer tech orbit ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#orbit-grad)" stroke-width="2" stroke-dasharray="12 6 3 6" />
  
  <!-- Outer glowing accent dots representing satellites/nodes -->
  <circle cx="50" cy="8" r="3" fill="#ea4884" filter="url(#neon-glow)" />
  <circle cx="92" cy="50" r="1.5" fill="#33c2cc" />
  <circle cx="8" cy="50" r="1.5" fill="#33c2cc" />

  <!-- Inner Futuristic "A" / Rocket / Portal shape -->
  <!-- Left leg of stylized 'A' -->
  <path d="M 50 20 L 22 72" fill="none" stroke="url(#cyber-grad)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />
  
  <!-- Right leg of stylized 'A' -->
  <path d="M 50 20 L 78 72" fill="none" stroke="url(#cyber-grad)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />
  
  <!-- Futuristic crossbar (inverted chevron coding bracket) -->
  <path d="M 33 54 L 50 40 L 67 54" fill="none" stroke="url(#cyber-grad)" stroke-width="5.5" stroke-linecap="round" filter="url(#neon-glow)" />
  
  <!-- Central core energy node -->
  <circle cx="50" cy="62" r="4.5" fill="#33c2cc" filter="url(#neon-glow)" />
  
  <!-- Tech UI framing lines / brackets at the bottom -->
  <path d="M 26 84 L 18 84 L 18 76" fill="none" stroke="#7a57db" stroke-width="2" stroke-linecap="round" />
  <path d="M 74 84 L 82 84 L 82 76" fill="none" stroke="#7a57db" stroke-width="2" stroke-linecap="round" />
</svg>
